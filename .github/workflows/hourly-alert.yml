name: Hourly Stock Alert

on:
  schedule:
    - cron: '5 10-17 * * 1-5'
      timezone: 'America/New_York'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '手动触发模式 (非交易时段强制执行请选 daily_final)'
        required: true
        type: choice
        default: 'daily_final'
        options:
          - daily_final
          - intraday

permissions:
  contents: write           # need to commit state.json

concurrency:
  group: hourly-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert check
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: ${{ inputs.run_mode || 'intraday' }}
          LOG_LEVEL: INFO
        run: python -m src.main

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "state: auto-update $(date -u -Iseconds)"
            git push
          fi
