name: Hourly Stock Alert

on:
  schedule:
    # Trigger at :05 past the hour, Eastern Time, Mon-Fri
    # Covers 10:05, 11:05, 12:05, 13:05, 14:05, 15:05, 16:05, 17:05 ET
    # = 8 runs per trading day (open+30min → close+1hr)
    # GitHub Actions auto-handles DST when timezone is specified
    - cron: '5 10-17 * * 1-5'
      timezone: 'America/New_York'
  workflow_dispatch:        # allow manual trigger for testing

permissions:
  contents: write           # need to commit state.json

concurrency:
  group: hourly-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert check
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: intraday
          LOG_LEVEL: INFO
        run: python -m src.main

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "state: auto-update $(date -u -Iseconds)"
            git push
          fi
